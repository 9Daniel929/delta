<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button GUI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Launcher -->
    <button id="launchBtn" onclick="toggleGUI(true)">Open Menu</button>

    <!-- The GUI -->
    <div id="gui" class="hidden">
        <span class="close-x" onclick="toggleGUI(false)">&times;</span>
        <h3>Control Panel</h3>
        
        <div class="button-grid">
            <button class="action-btn">Action 1</button>
            <button class="action-btn">Action 2</button>
            <button class="action-btn">Action 3</button>
            <button class="action-btn">Action 4</button>
            <button class="action-btn">Action 5</button>
            <button class="action-btn">Action 6</button>
        </div>
    </div>

    <script>
        function toggleGUI(show) {
            const gui = document.getElementById('gui');
            if (show) {
                gui.style.display = 'block';
            } else {
                gui.style.display = 'none';
            }
        }
    </script>
</body>
</html>
